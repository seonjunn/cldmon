<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Usage</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="style.css?v=20260313h">
</head>
<body>
  <div id="login-screen">
    <div class="login-box">
      <h2>Claude Status Dashboard</h2>
      <p>Type your name for Slack alerts.<br>Leave empty for guest mode.</p>
      <div id="login-form" role="group" aria-label="Slack member entry">
        <div class="login-input-wrap">
          <input type="text" id="slack-id-input" autocomplete="off" autocapitalize="off" spellcheck="false" inputmode="search" autofocus>
          <div id="slack-user-menu" class="slack-user-menu" hidden></div>
        </div>
        <button type="button" id="enter-button">Enter</button>
      </div>
      <div id="login-error"></div>
    </div>
  </div>
  <div id="app" style="display:none">
    <header>
      <div class="header-bar">
        <div class="header-main">
          <h1>Claude Usage</h1>
          <div class="meta">
            <span id="last-updated">Loading...</span>
            <span id="next-refresh"></span>
          </div>
        </div>
        <div class="session-bar">
          <span id="session-label"></span>
          <button type="button" id="logout-button">Logout</button>
        </div>
      </div>
    </header>
    <main id="dashboard"></main>
    <section id="chart-section">
      <div class="chart-header">
        <h2>Usage History</h2>
        <div class="range-buttons">
          <button class="range-btn active" data-range="1h">1h</button>
          <button class="range-btn" data-range="5h">5h</button>
          <button class="range-btn" data-range="1d">1d</button>
          <button class="range-btn" data-range="7d">7d</button>
        </div>
      </div>
      <div id="charts"></div>
    </section>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="app.js?v=20260313h"></script>
</body>
</html>
